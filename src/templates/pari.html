<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pour Combien ? — Pari #{{ pari.id }}</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d; --surface: #161616; --border: #2a2a2a;
    --accent: #f0e040; --accent2: #ff6b35; --text: #f0ede8; --muted: #666;
    --green: #4ade80; --red: #f87171;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif;
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:2rem;
  }
  .noise {
    position:fixed; inset:0; z-index:0; pointer-events:none; opacity:.03;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size:200px 200px;
  }
  .container { position:relative; z-index:1; width:100%; max-width:520px; }
  .back { display:inline-block; color:var(--muted); font-size:0.85rem; text-decoration:none; margin-bottom:1.5rem; transition:color 0.2s; }
  .back:hover { color:var(--text); }
  .logo { font-family:'Bebas Neue',sans-serif; font-size:2rem; letter-spacing:0.06em; margin-bottom:1.5rem; }
  .logo span { color:var(--accent); }

  .card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:2rem; margin-bottom:1rem; }

  .badge {
    display:inline-block; font-size:0.7rem; text-transform:uppercase; letter-spacing:0.1em;
    padding:0.3em 0.7em; border-radius:20px; margin-bottom:1rem;
    border:1px solid var(--accent); color:var(--accent);
  }
  .pari-text { font-size:1.25rem; font-weight:500; line-height:1.4; margin-bottom:1.25rem; }

  .meta-max {
    display:inline-flex; align-items:center; gap:0.5rem;
    background:var(--bg); border:1px solid var(--border);
    border-radius:8px; padding:0.4rem 0.8rem;
    font-size:0.85rem; color:var(--muted);
  }
  .meta-max .val { font-family:'Bebas Neue',sans-serif; font-size:1.3rem; color:var(--accent); letter-spacing:0.05em; }

  /* Players */
  .players { display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-top:1.5rem; }
  .player {
    background:var(--bg); border:1px solid var(--border);
    border-radius:12px; padding:1rem; text-align:center; position:relative; transition:border-color 0.3s;
  }
  .player.me { border-color:var(--accent); }
  .player.done { border-color:var(--green); }
  .player.active-turn { border-color:var(--accent2); }
  .player-name { font-family:'Bebas Neue',sans-serif; font-size:1.4rem; letter-spacing:0.05em; }
  .player-status { font-size:0.75rem; color:var(--muted); margin-top:0.3rem; }
  .player-number { font-family:'Bebas Neue',sans-serif; font-size:2.5rem; color:var(--accent); margin-top:0.3rem; line-height:1; }
  .me-badge {
    position:absolute; top:-0.5rem; left:-0.5rem;
    background:var(--accent); color:#0d0d0d; font-size:0.6rem;
    text-transform:uppercase; letter-spacing:0.1em; padding:0.2em 0.5em; border-radius:20px; font-weight:600;
  }

  /* Action zones */
  .action { margin-top:1.5rem; }
  .action-title {
    font-size:0.8rem; text-transform:uppercase; letter-spacing:0.1em;
    color:var(--muted); margin-bottom:0.9rem;
  }
  .action-title strong { color:var(--accent2); }

  .input-row { display:flex; gap:0.75rem; align-items:stretch; }
  .big-input {
    flex:1; background:var(--bg); border:2px solid var(--border); border-radius:12px;
    color:var(--text); font-family:'Bebas Neue',sans-serif; font-size:2rem;
    letter-spacing:0.05em; padding:0.6rem 1rem; outline:none;
    transition:border-color 0.2s; text-align:center;
  }
  .big-input:focus { border-color:var(--accent); }
  .big-input::placeholder { color:var(--border); }
  .ok-btn {
    background:var(--accent); border:none; border-radius:12px;
    font-family:'Bebas Neue',sans-serif; font-size:1.2rem; letter-spacing:0.08em;
    color:#0d0d0d; cursor:pointer; transition:all 0.15s; padding:0 1.5rem; white-space:nowrap;
  }
  .ok-btn:hover { opacity:0.9; transform:translateY(-1px); }
  .ok-btn:active { transform:translateY(0); }
  .input-hint { font-size:0.75rem; color:var(--muted); margin-top:0.5rem; text-align:center; }

  /* Waiting / info boxes */
  .info-box {
    margin-top:1.5rem; background:var(--bg); border:1px solid var(--border);
    border-radius:12px; padding:1.25rem; text-align:center;
  }
  .info-box .icon { font-size:2rem; margin-bottom:0.5rem; }
  .info-box p { color:var(--muted); font-size:0.9rem; line-height:1.6; }
  .info-box strong { color:var(--text); }
  .info-box.highlight { border-color:var(--accent2); }

  .error-msg { color:var(--red); font-size:0.85rem; margin-top:0.75rem; text-align:center; min-height:1.2em; }

  /* Result */
  .result-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:2rem; text-align:center; }
  .result-emoji { font-size:4rem; margin-bottom:1rem; }
  .result-title { font-family:'Bebas Neue',sans-serif; font-size:2.8rem; letter-spacing:0.05em; margin-bottom:0.5rem; line-height:1; }
  .result-title.win { color:var(--green); }
  .result-title.miss { color:var(--muted); }
  .result-desc { color:var(--muted); font-size:0.95rem; line-height:1.5; margin-bottom:1.5rem; }
  .numbers-reveal { display:flex; align-items:center; justify-content:center; gap:2rem; margin:1.5rem 0; }
  .rev-item { text-align:center; }
  .rev-name { font-size:0.75rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); }
  .rev-num { font-family:'Bebas Neue',sans-serif; font-size:4rem; line-height:1; }
  .rev-num.match { color:var(--green); }
  .rev-num.miss { color:var(--muted); }
  .rev-sep { font-size:1.2rem; color:var(--border); padding-top:1.5rem; }
</style>
</head>
<body>
<div class="noise"></div>
<div class="container">
  <a class="back" href="/">← Créer un pari</a>
  <div class="logo">Pour<span>Combien</span><span style="color:var(--accent2)">?</span></div>
  <div id="app"></div>
</div>

<script>
const PARI = {{ pari | tojson }};
const ROLE = "{{ role }}";

function render(p, role) {
  const app = document.getElementById('app');
  const aChosen = p.choix_a !== null;
  const bChosen = p.choix_b !== null;
  const bothChosen = aChosen && bChosen;
  const maxSet = p.max !== null;

  if (bothChosen) { renderResult(p); return; }

  // -- Header commun --
  const maxDisplay = maxSet
    ? `<div class="meta-max">Pour combien : <span class="val">1 → ${p.max.toLocaleString()}</span></div>`
    : `<div class="meta-max" style="color:var(--muted)">⏳ Pour combien non défini</div>`;

  // -- Cards joueurs --
  function playerCard(key, name, chosen, myRole) {
    const isMe = role === myRole;
    const cls = ['player', isMe ? 'me' : '', chosen ? 'done' : (maxSet && !chosen ? 'active-turn' : '')].filter(Boolean).join(' ');
    return `
      <div class="${cls}">
        ${isMe ? '<div class="me-badge">Toi</div>' : ''}
        <div class="player-name">${name}</div>
        <div class="player-status">${chosen ? '✓ A choisi' : (maxSet ? '🎯 En attente' : '⏳')}</div>
      </div>`;
  }

  // -- Zone d'action --
  let action = '';

  if (!maxSet) {
    if (role === 'b') {
      action = `
        <div class="action">
          <p class="action-title">À toi <strong>${p.personne_b}</strong> ! Fixe le pour combien du pari :</p>
          <div class="input-row">
            <input class="big-input" id="max-input" type="number" min="2" placeholder="100" autofocus>
            <button class="ok-btn" onclick="setMax()">OK →</button>
          </div>
          <p class="input-hint">Le pari ira de 1 jusqu'à ce nombre</p>
        </div>`;
    } else if (role === 'a') {
      action = `
        <div class="info-box highlight">
          <div class="icon">📨</div>
          <p>En attente de <strong>${p.personne_b}</strong> qui doit fixer le pour combien...<br>Assure-toi de lui avoir envoyé le lien !</p>
        </div>`;
    } else {
      action = `<div class="info-box"><p>👀 En attente que ${p.personne_b} fixe le pour combien.</p></div>`;
    }
  } else {
    // Max défini — chacun peut choisir son nombre (ordre libre)
    if (role === 'a' && !aChosen) {
      action = `
        <div class="action">
          <p class="action-title">À toi <strong>${p.personne_a}</strong> ! Choisis entre 1 et ${p.max.toLocaleString()} :</p>
          <div class="input-row">
            <input class="big-input" id="num-input" type="number" min="1" max="${p.max}" placeholder="?" autofocus>
            <button class="ok-btn" onclick="faireChoix()">OK →</button>
          </div>
          <p class="input-hint">Entre 1 et ${p.max.toLocaleString()}</p>
        </div>`;
    } else if (role === 'b' && !bChosen) {
      action = `
        <div class="action">
          <p class="action-title">À toi <strong>${p.personne_b}</strong> ! Choisis entre 1 et ${p.max.toLocaleString()} :</p>
          <div class="input-row">
            <input class="big-input" id="num-input" type="number" min="1" max="${p.max}" placeholder="?" autofocus>
            <button class="ok-btn" onclick="faireChoix()">OK →</button>
          </div>
          <p class="input-hint">Entre 1 et ${p.max.toLocaleString()}</p>
        </div>`;
    } else if ((role === 'a' && aChosen) || (role === 'b' && bChosen)) {
      const otherName = role === 'a' ? p.personne_b : p.personne_a;
      action = `
        <div class="info-box">
          <div class="icon">⏳</div>
          <p>Tu as choisi ! En attente de <strong>${otherName}</strong>…</p>
        </div>`;
    } else if (role === 'spectator') {
      action = `<div class="info-box"><p>👀 Tu es spectateur de ce pari.</p></div>`;
    }
  }

  app.innerHTML = `
    <div class="card">
      <div class="badge">Pari #${p.id}</div>
      <p class="pari-text">« ${p.pari} »</p>
      ${maxDisplay}
      <div class="players">
        ${playerCard('a', p.personne_a, aChosen, 'a')}
        ${playerCard('b', p.personne_b, bChosen, 'b')}
      </div>
      ${action}
      <p class="error-msg" id="error-msg"></p>
    </div>`;

  bindEnter();
}

function bindEnter() {
  ['max-input','num-input'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('keydown', e => { if (e.key === 'Enter') { id === 'max-input' ? setMax() : faireChoix(); } });
  });
}

async function setMax() {
  const inp = document.getElementById('max-input');
  const val = parseInt(inp?.value);
  if (!val || val < 2) { showErr('Le nombre doit être au moins 2 !'); return; }
  const res = await fetch(`/api/pari/${PARI.id}/setmax`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({max: val})
  });
  const data = await res.json();
  if (!res.ok) { showErr(data.error || 'Erreur'); return; }
  render(data, data.role);
}

async function faireChoix() {
  const inp = document.getElementById('num-input');
  const val = parseInt(inp?.value);
  if (!val || isNaN(val)) { showErr('Entre un nombre valide !'); return; }
  const res = await fetch(`/api/pari/${PARI.id}/choix`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({choix: val})
  });
  const data = await res.json();
  if (!res.ok) { showErr(data.error || 'Erreur'); return; }
  render(data, data.role);
}

function showErr(msg) {
  const el = document.getElementById('error-msg');
  if (el) el.textContent = msg;
}

function renderResult(p) {
  const win = p.choix_a === p.choix_b;
  document.getElementById('app').innerHTML = `
    <div class="result-card">
      <div class="result-emoji">${win ? '😈' : '😮‍💨'}</div>
      <div class="result-title ${win ? 'win' : 'miss'}">${win ? 'PLACE A L\'ACTION !' : 'MAUVAISE PIOCHE !'}</div>
      <p class="result-desc">
        ${win
          ? `HEHEHEHE, vous avez tous les deux choisi <strong>${p.choix_a}</strong> !<br>Le pari doit être tenu 💪`
          : `Ouf, vous n'avez pas choisi le même nombre...`}
      </p>
      <div class="numbers-reveal">
        <div class="rev-item">
          <div class="rev-name">${p.personne_a}</div>
          <div class="rev-num ${win ? 'match' : 'miss'}">${p.choix_a}</div>
        </div>
        <div class="rev-sep">VS</div>
        <div class="rev-item">
          <div class="rev-name">${p.personne_b}</div>
          <div class="rev-num ${win ? 'match' : 'miss'}">${p.choix_b}</div>
        </div>
      </div>
      <a href="/" style="color:var(--accent2);text-decoration:none;font-size:0.9rem;">Créer un nouveau pari →</a>
    </div>`;
}

render(PARI, ROLE);
</script>
</body>
</html>
